<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax API Call</title>
</head>
<body>
    <h1>Ajax API Call</h1>

    <div id="countriesContainer"></div>
    <script>
        // create XMLHttpRequest Object
        let request = new XMLHttpRequest();

        //Open the request
        request.open('GET', 'https://restcountries.com/v3.1/name/uk');

        //SEND THE RQUEST
        data = request.send();

        //REGISTER A CALLBACK ON THE REQUEST OBJECT FOR THE LOAD EVENT
        request.addEventListener('load', function(){
        // console.log("PRE-RESPONSE DATA", this.responseText);

        //Json Data to javascript object destruc2ture 
        // the object destructuring will extract the 
        // object from the property
        let [data] = JSON.parse(this.responseText);
        console.log("CONVERTED JSON FORMAT", data)

        const flag = data.flags.png;
        const name = data.name.common;
        const region = data.region;
        const population = data.population.toLocaleString();
        const language = Object.values(data.languages)[0];
        const currrency = Object.values(data.currencies)[0].name;
         

        //Fill the teplate with real data
        let html = `
        <article class="country">
        <img class="country__img" src="${flag}" alt="Flag of ${name}"/>
        <div class="country__data">
            <h3 class="country__name">${name}</h3>
            <h4 class="country__region">${region}</h4>
            <p class="country__row"><span>🧑‍🤝‍🧑</span>${population}</p>
            <p class="country__row"><span>🗣️</span>${language}</p>
         </div>
    </article>
                `;
                let countriesContainer = document.getElementById("countriesContainer");
                countriesContainer.insertAdjacentHTML('beforeend', html)
       });
    </script>
    
</body>
</html>
