<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Portrait Mesh — Demo</title>
<style>
  :root {
    --bg: #070b14;
    --card: #0d1424;
    --line: rgba(255,255,255,0.08);
    --text: #c9d6e8;
    --muted: #5d7392;
    --accent: #2dd4bf;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .frame {
    position: relative;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: var(--card);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  canvas { display: block; cursor: crosshair; }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    font-size: 12.5px;
    letter-spacing: 0.02em;
    color: var(--text);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }
  .btn.accent { color: #06231f; background: var(--accent); border-color: var(--accent); }
  .btn.accent:hover { background: #5eead4; }
  input[type="file"] { display: none; }
  .caption {
    font-size: 12.5px;
    color: var(--muted);
    text-align: center;
    max-width: 380px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="frame">
    <canvas id="mesh" width="380" height="460"></canvas>
  </div>
  <div class="controls">
    <label class="btn accent" for="fileInput">Use a photo</label>
    <input id="fileInput" type="file" accept="image/*" />
    <button class="btn" id="replayBtn">Replay</button>
  </div>
  <p class="caption">Move your cursor over the mesh — the dots react and spring back. Drop in any photo to see it mapped instantly; nothing leaves your browser.</p>
</div>

<script>
(function () {
  const canvas = document.getElementById('mesh');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const dpr = window.devicePixelRatio || 1;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  // ---- tunable parameters ----
  const ROWS = 64;
  const COLS = 90;
  const AMPLITUDE = 11;          // how far brightness can bend a line, in px
  const SMOOTHING = 0.28;        // lower = lazier/smoother line, higher = jumpier
  const ACCENT_THRESHOLD = 0.11; // local-contrast cutoff for accent dots
  const MATERIALIZE_DURATION = 1800;
  const ZOOM_FACTOR = 4;         // how "zoomed out" dots start before converging
  const JITTER_MAX = 220;        // ms of random per-dot stagger
  const MOUSE_RADIUS = 95;
  const MAX_PUSH = 18;           // px a dot can be shoved by the cursor
  const RETURN_SPEED = 0.12;     // how quickly displaced dots ease back

  const BASE_COLOR = 'rgba(186, 207, 226, 0.55)';
  const ACCENT_COLOR = 'rgba(45, 212, 191, 0.9)';
  const BACKGROUND = '#0d1424';

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let dots = [];
  let physOx = new Float32Array(0);
  let physOy = new Float32Array(0);
  let startTime = 0;
  const mouse = { x: 0, y: 0, active: false };

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  // Draws a synthetic stylized bust (no real photo) used as the default placeholder.
  function drawPlaceholder(c) {
    c.fillStyle = '#0d1424';
    c.fillRect(0, 0, W, H);

    const amb = c.createRadialGradient(W * 0.5, H * 0.32, 10, W * 0.5, H * 0.5, H * 0.85);
    amb.addColorStop(0, 'rgba(255,255,255,0.10)');
    amb.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = amb;
    c.fillRect(0, 0, W, H);

    const cx = W * 0.5, headCy = H * 0.34, rx = W * 0.21, ry = H * 0.22;

    c.beginPath();
    c.moveTo(W * 0.12, H * 1.05);
    c.quadraticCurveTo(W * 0.12, H * 0.62, W * 0.5, H * 0.58);
    c.quadraticCurveTo(W * 0.88, H * 0.62, W * 0.88, H * 1.05);
    c.closePath();
    const sh = c.createLinearGradient(0, H * 0.55, 0, H);
    sh.addColorStop(0, 'rgba(255,255,255,0.22)');
    sh.addColorStop(1, 'rgba(255,255,255,0.05)');
    c.fillStyle = sh;
    c.fill();

    const hg = c.createRadialGradient(cx - rx * 0.3, headCy - ry * 0.4, 4, cx, headCy, rx * 1.3);
    hg.addColorStop(0, 'rgba(255,255,255,0.42)');
    hg.addColorStop(1, 'rgba(255,255,255,0.16)');
    c.beginPath();
    c.ellipse(cx, headCy, rx, ry, 0, 0, Math.PI * 2);
    c.fillStyle = hg;
    c.fill();

    c.beginPath();
    c.ellipse(cx, headCy - ry * 0.55, rx * 1.05, ry * 0.65, 0, Math.PI, Math.PI * 2);
    c.fillStyle = 'rgba(0,0,0,0.35)';
    c.fill();

    c.fillStyle = 'rgba(0,0,0,0.4)';
    c.fillRect(cx - rx * 0.55, headCy - ry * 0.12, rx * 0.4, ry * 0.09);
    c.fillRect(cx + rx * 0.15, headCy - ry * 0.12, rx * 0.4, ry * 0.09);

    c.beginPath();
    c.ellipse(cx - rx * 0.35, headCy + ry * 0.02, rx * 0.13, ry * 0.08, 0, 0, Math.PI * 2);
    c.ellipse(cx + rx * 0.35, headCy + ry * 0.02, rx * 0.13, ry * 0.08, 0, 0, Math.PI * 2);
    c.fillStyle = 'rgba(0,0,0,0.5)';
    c.fill();

    c.beginPath();
    c.ellipse(cx, headCy + ry * 0.28, rx * 0.08, ry * 0.18, 0, 0, Math.PI * 2);
    c.fillStyle = 'rgba(0,0,0,0.25)';
    c.fill();

    c.beginPath();
    c.ellipse(cx, headCy + ry * 0.58, rx * 0.22, ry * 0.07, 0, 0, Math.PI * 2);
    c.fillStyle = 'rgba(0,0,0,0.35)';
    c.fill();
  }

  function buildField(imageData) {
    const data = imageData.data;
    const brightnessAt = (x, y) => {
      const px = Math.min(W - 1, Math.max(0, Math.round(x)));
      const py = Math.min(H - 1, Math.max(0, Math.round(y)));
      const i = (py * W + px) * 4;
      return (data[i] + data[i + 1] + data[i + 2]) / 3 / 255;
    };

    const rowSpacing = H / ROWS;
    const colSpacing = W / COLS;
    const field = [];
    const cx = W / 2, cy = H / 2;

    for (let r = 0; r < ROWS; r++) {
      const y0 = (r + 0.5) * rowSpacing;
      let rowAvg = 0;
      for (let c = 0; c < COLS; c++) rowAvg += brightnessAt((c + 0.5) * colSpacing, y0);
      rowAvg /= COLS;

      let curY = y0;
      for (let c = 0; c < COLS; c++) {
        const x = (c + 0.5) * colSpacing;
        const b = brightnessAt(x, y0);
        const bUp = brightnessAt(x, y0 - rowSpacing * 0.6);
        const bDown = brightnessAt(x, y0 + rowSpacing * 0.6);
        const edge = Math.abs(bUp - bDown);
        const target = y0 + (b - rowAvg) * AMPLITUDE;
        curY += (target - curY) * SMOOTHING;

        const tx = x, ty = curY;
        field.push({
          tx, ty,
          sx: cx + (tx - cx) * ZOOM_FACTOR,
          sy: cy + (ty - cy) * ZOOM_FACTOR,
          size: 1.1 + edge * 3.2,
          accent: edge > ACCENT_THRESHOLD,
          delay: Math.random() * JITTER_MAX,
        });
      }
    }
    return field;
  }

  function materialize(field) {
    dots = field;
    physOx = new Float32Array(dots.length);
    physOy = new Float32Array(dots.length);
    startTime = performance.now();
  }

  function processCanvas(sourceCtx) {
    const imageData = sourceCtx.getImageData(0, 0, W, H);
    materialize(buildField(imageData));
  }

  function loadImageFile(file) {
    const img = new Image();
    img.onload = () => {
      const off = document.createElement('canvas');
      off.width = W; off.height = H;
      const offCtx = off.getContext('2d');
      const scale = Math.max(W / img.width, H / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      offCtx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
      processCanvas(offCtx);
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(file);
  }

  // initial placeholder
  const offInit = document.createElement('canvas');
  offInit.width = W; offInit.height = H;
  drawPlaceholder(offInit.getContext('2d'));
  processCanvas(offInit.getContext('2d'));

  canvas.addEventListener('pointermove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    mouse.active = true;
  });
  canvas.addEventListener('pointerleave', () => { mouse.active = false; });

  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) loadImageFile(file);
  });
  document.getElementById('replayBtn').addEventListener('click', () => {
    dots.forEach(d => { d.delay = Math.random() * JITTER_MAX; });
    startTime = performance.now();
  });

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = BACKGROUND;
    ctx.fillRect(0, 0, W, H);

    if (dots.length) {
      const elapsed = performance.now() - startTime;
      for (let i = 0; i < dots.length; i++) {
        const d = dots[i];
        const progress = reducedMotion ? 1 : Math.min(1, Math.max(0, (elapsed - d.delay) / MATERIALIZE_DURATION));
        const eased = easeOutCubic(progress);

        let px = d.sx + (d.tx - d.sx) * eased;
        let py = d.sy + (d.ty - d.sy) * eased;

        if (!reducedMotion) {
          const dx = d.tx - mouse.x, dy = d.ty - mouse.y;
          const dist = Math.hypot(dx, dy);
          let targetOx = 0, targetOy = 0;
          if (mouse.active && dist < MOUSE_RADIUS) {
            const falloff = 1 - dist / MOUSE_RADIUS;
            const safe = dist || 1;
            targetOx = (dx / safe) * falloff * MAX_PUSH;
            targetOy = (dy / safe) * falloff * MAX_PUSH;
          }
          physOx[i] += (targetOx - physOx[i]) * RETURN_SPEED;
          physOy[i] += (targetOy - physOy[i]) * RETURN_SPEED;
          px += physOx[i] * eased;
          py += physOy[i] * eased;
        }

        ctx.beginPath();
        ctx.fillStyle = d.accent ? ACCENT_COLOR : BASE_COLOR;
        ctx.globalAlpha = eased;
        ctx.arc(px, py, d.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
