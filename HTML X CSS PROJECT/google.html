<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        .bg {
            background-image: url(images/foodwagon/67024c56ad42b6be9069aba3dcabc05b4b387176.png);
        }

        .content {
            display: block;
            justify-items: center;
            align-content: center;
            margin-top: 5.7em;
        }

        h1 {
            font-size: 6.2em;
            cursor: default; 
        }

        .blue {
            color: rgba(25, 166, 231, 0.932);
            opacity: 0.7;
        }

        .red {
            color: red;
             opacity: 0.7;

        }

        .o {
            opacity: 0.7;
            color: yellow;
        }


        .l {
            color: green;
            opacity: 0.7;

        }

        .search {
            margin-top: -13px;
            position: fixed;
            width: 60%;
            height: 40px;
            border-radius: 5pc;
             padding-left: 10px;
            /* box-shadow: 3px 3px ; */

        }
    </style>
    <div>
        <div class="bg"></div>
        <div class="content">
            <header>
                <h1><span class="blue">G</span><span class="red">o</span><span class="o">o</span><span
                        class="blue">g</span><span class="l">l</span><span class="red">e</span></h1>
            </header>
            <div class="search">
                <input class="search" placeholder="Search Google or type url here" style="margin-right: 300px;">
                
            </div>
        </div>
    </div>

</html>
