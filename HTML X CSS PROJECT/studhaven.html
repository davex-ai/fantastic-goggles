<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere</title>
    <style>
        * {
            margin: auto;
            padding: 0;
            font-family: 'Poppins', 'Segoe UI', sans-serif;

        }

        .whole {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .page {
            width: 12em;
            padding: 50px;
            margin: 5em 0em 0 5em;
            background-color: whitesmoke;
            box-shadow: 0px 5px 5px 5px gainsboro;

        }

        h2 {
            color: #1e1e5f;
            font-size: 27px;
            margin: 20px;
            text-align: center;
        }

        p {
            margin: 20px;
            margin-left: -30px;
            padding: 20px;
            width: 13.5em;
            border-radius: 5px;
            background-color: #fcd77f;
            text-align: center;
             line-height: 1.4;
        }

        .list {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list div {
            display: flex;
            flex-direction: column;
        }

        .list button {
            display: flex;
            flex-direction: column;
            width: 9em;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
            background-color: #ffffff;
        }

        .list button:hover {
            background-color: #f0f0f0;
            cursor: pointer;
        }


        .down {
            margin-left: 20px;
        }

        .up {
            margin-left: -2em;
        }

        #combo {
            display: flex;
            flex-direction: column;
            width: 19em;
            padding: 10px;
            margin-top: 10px;
            margin-left: -2em;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            color: rgb(30, 30, 95);
        }

        #comb  {
            text-decoration: none;
            cursor: pointer;
            color: black;
            font-weight: 500;
            margin-left: 1em;
            padding: 10px 60px 10px 60px;
        }

        #comb:hover {
            border-radius: 10px;
            background-color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="whole">
        <div class="page">
            <h2>Welcome to EduSphere</h2>
            <p>Education is the most powerful weapon which you can use to change the world</p>
            <div class="list">
                <div class="up">
                    <button>Notes</button>
                    <button>Timetable</button>
                </div>
                <div class="down">
                    <button>Tasks</button>
                    <button>Tips</button>
                </div>
            </div>
            <div>
                <select id="combo" name="add-gender">
                    <option value="Male">Select Class</option>
                    <option value="Female">Fine Girl</option>
                </select>
            </div>
             <a href="go.html" id="comb">Log in</a>
        </div>
    </div>
</body>

</html>
