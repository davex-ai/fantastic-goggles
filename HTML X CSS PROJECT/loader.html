<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loader</title>
    <style>
        .loader {
            width: 100vw;
            height: 100vh;
            position: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: loader-rotation 2s alternate-reverse infinite;
            transition: display 3s;
        }

        .loader:hover {
            transform: 120%;
            background-color: aqua;
        }

        @keyframes loader-rotation {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg);
            }
        }

        .box {
            height: 100px;
            width: 100px;
            background-color: red;
            transition: display 1s;
        }

        .box:hover {
            display: none;
        }
    </style>
</head>

<body>
    <div class="loader">
        <div class="box"></div>

    </div>
</body>

</html>
