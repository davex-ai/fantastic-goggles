<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: auto;
            padding: 0;
        }

        .body {
            background-color: red;
        }

        .loader {
            width: 20%;
            height: 20%;
            animation: rotate 2s;
            border: 2px #333;
            color: #b4b4b4;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }

        }
    </style>
</head>

<body>
    <div class="loader"></div>
    
</body>

</html>
