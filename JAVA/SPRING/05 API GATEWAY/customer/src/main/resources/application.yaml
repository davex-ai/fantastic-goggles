spring:
  application:
    name: customer
  datasource:
    url: jdbc:mysql://localhost:3306/customerdb
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
  #  security\
  #    user:
