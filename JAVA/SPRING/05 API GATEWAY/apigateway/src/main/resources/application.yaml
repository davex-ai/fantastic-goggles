spring:
  application:
    name: apigateway

  cloud:
    gateway:
        routes:
          - id: customer-service
            uri: lb://CUSTOMER
            predicates:
              - Path=/customers/**

          - id: order-service
            uri: lb://ORDER
            predicates:
              - Path=/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
logging:
  level:
    org.springframework.cloud.gateway: DEBUG